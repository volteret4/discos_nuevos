                                    React.createElement(
                                        "th",
                                        th("album", "Álbum"),
                                    ),
                                    React.createElement(
                                        "th",
                                        th("genres", "Géneros"),
                                    ),
                                    React.createElement(
                                        "th",
                                        th("total_scrobbles", "Scrobbles"),
                                    ),
                                    React.createElement(
                                        "th",
                                        th("first_scrobble", "Primera escucha"),
                                    ),
                                    React.createElement(
                                        "th",
                                        th("last_scrobble", "Última escucha"),
                                    ),
                                    React.createElement(
                                        "th",
                                        th("active_days_span", "Rango días"),
                                    ),
                                    React.createElement(
                                        "th",
                                        th("days_listened", "Días escuchados"),
                                    ),
                                ),
                            ),
                            React.createElement(
                                "tbody",
                                null,
                                ...visible.map((a, i) =>
                                    React.createElement(
                                        "tr",
                                        {
                                            key: i,
                                            className: `clickable${activeId === a.album_id ? " row-active" : ""}`,
                                            onClick: () =>
                                                onSelect({
                                                    type: "album",
                                                    id: a.album_id,
                                                    name: a.album,
                                                    artist: a.artist,
                                                }),
                                        },
                                        React.createElement(
                                            "td",
                                            { className: "td-artist" },
                                            a.artist,
                                        ),
                                        React.createElement(
                                            "td",
                                            { className: "td-album" },
                                            a.album,
                                        ),
                                        React.createElement(
                                            "td",
                                            { className: "td-genre" },
                                            a.genres
                                                ? a.genres
                                                      .split(",")
                                                      .map((g) => g.trim())
                                                      .slice(0, 2)
                                                      .join(", ")
                                                : "—",
                                        ),
                                        React.createElement(
                                            "td",
                                            { className: "td-num" },
                                            scrobbleBadge(a.total_scrobbles),
                                        ),
                                        React.createElement(
                                            "td",
                                            { className: "td-date" },
                                            fmtDate(a.first_scrobble),
                                        ),
                                        React.createElement(
                                            "td",
                                            { className: "td-date" },
                                            fmtDate(a.last_scrobble),
                                        ),
                                        React.createElement(
                                            "td",
                                            {
                                                className: "td-num",
                                                style: {
                                                    color: "var(--text-dim)",
                                                },
                                            },
                                            a.active_days_span != null
                                                ? `${fmtN(a.active_days_span)}d`
                                                : "—",
                                        ),
                                        React.createElement(
                                            "td",
                                            {
                                                className: "td-num",
                                                style: {
                                                    color: "var(--text-dim)",
                                                },
                                            },
                                            a.days_listened != null
                                                ? `${fmtN(a.days_listened)}d`
                                                : "—",
                                        ),
                                    ),
                                ),
                            ),
                        ),
                    ),
                    visibleCount < sorted.length &&
                        React.createElement(
                            "div",
                            {
                                style: {
                                    textAlign: "center",
                                    marginBottom: 28,
                                },
                            },
                            React.createElement(
                                "button",
                                {
                                    className: "reset-btn",
                                    style: {
                                        padding: "10px 32px",
                                        fontSize: 12,
                                    },
                                    onClick: () =>
                                        setVisibleCount((v) => v + 25),
                                },
                                `Cargar 25 más (${visibleCount} / ${sorted.length} álbumes)`,
                            ),
                        ),
                );
            }
            function GenresTab({ genres: all, onSelect, activeName }) {
                const [search, setSearch] = useState("");
                const filtered = useMemo(
                    () =>
                        (all || []).filter(
                            (g) =>
                                !search ||
                                g.genre
                                    .toLowerCase()
                                    .includes(search.toLowerCase()),

                    [all, search],
                );
                const maxS = filtered[0]?.scrobbles || 1;
                return React.createElement(
                    "div",
                    null,
                    React.createElement(
                        "div",
                        { className: "filters" },
                        React.createElement(
                            "span",
                            { className: "filter-label" },

                    React.createElement(

                        ...filtered.map((g, i) => {

                                    "div",

            /* ── APP ROOT ── */
            function App() {
                const [data, setData] = useState(null);
                const [error, setError] = useState(null);
                const [tab, setTab] = useState("overview");
                const [selected, setSelected] = useState(null);

                useEffect(() => {
                    fetch("lastfm_stats.json")
                        .then((r) => {
                            if (!r.ok) throw new Error(`HTTP ${r.status}`);
                            return r.json();
                        })
                        .then(setData)
                        .catch((e) => setError(e.message));
                }, []);

                const handleSelect = useCallback((entity) => {
                    setSelected((prev) =>
                        prev &&
                        prev.type === entity.type &&
                        (prev.id === entity.id || prev.name === entity.name)
                            ? null
                            : entity,
                    );
                }, []);
                const handleClose = useCallback(() => setSelected(null), []);
                const prefetchDetail = useCallback(() => {
                    loadDetail();
                }, []);

                if (error)
                    return React.createElement(
                        "div",
                        { className: "center-msg" },
                        React.createElement(
                            "h2",
                            null,
                            "No se pudo cargar lastfm_stats.json",
                        ),
                        React.createElement(
                            "pre",
                            null,
                            `Ejecuta primero:\n\n  pip install requests python-dotenv\n  python extraer_lastfm.py\n\nError: ${error}`,
                        ),
                    );
                if (!data)
                    return React.createElement(
                        "div",
                        { className: "center-msg" },
                        React.createElement("div", { className: "spinner" }),
                        React.createElement("span", null, "Cargando datos…"),
                    );

                const genAt = data.generated_at
                    ? new Date(data.generated_at).toLocaleDateString("es", {
                          day: "2-digit",
                          month: "short",
                          year: "numeric",
                      })
                    : null;

                const tabs = [
                    { id: "overview", label: "Resumen" },
                    { id: "artists", label: "Artistas" },
                    { id: "albums", label: "Álbumes" },
                    { id: "genres", label: "Géneros" },
                    { id: "hourly", label: "Por Horas" },
                ];
                const activeArtistId =
                    selected?.type === "artist" ? selected.id : null;
                const activeAlbumId =
                    selected?.type === "album" ? selected.id : null;
                const activeGenre =
                    selected?.type === "genre" ? selected.name : null;

                return React.createElement(
                    "div",
                    null,
                    React.createElement(
                        "header",
                        null,
                        React.createElement(
                            "h1",
                            null,
                            React.createElement("em", null, "Last.fm"),
                            " Stats",

                        data.username &&
                            React.createElement(
                                "span",
                                { className: "header-meta" },

                                    className: "dot",

                                "span",
                                { className: "header-meta" },
                                `actualizado ${genAt}`,
                            ),
                    ),
                    React.createElement(
                        "main",
                        null,
                        React.createElement(
                            "div",
                            { className: "tabs" },
                            ...tabs.map((t) =>
                                React.createElement(
                                    "button",
                                    {
                                        key: t.id,
                                        className: `tab-btn${tab === t.id ? " active" : ""}`,
                                        onClick: () => setTab(t.id),
                                        onMouseEnter:
                                            t.id !== "overview"
                                                ? prefetchDetail
                                                : undefined,
                                    },
                                    t.label,
                                ),
                            ),
                        ),
                        tab === "overview" &&
                            React.createElement(OverviewTab, { data }),
                        tab === "artists" &&
                            React.createElement(ArtistsTab, {
                                artists: data.artists,
                                onSelect: handleSelect,
                                activeId: activeArtistId,
                            }),
                        tab === "albums" &&
                            React.createElement(AlbumsTab, {
                                albums: data.albums,
                                onSelect: handleSelect,
                                activeId: activeAlbumId,
                            }),
                        tab === "genres" &&
                            React.createElement(GenresTab, {
                                genres: data.genres,
                                onSelect: handleSelect,
                                activeName: activeGenre,
                            }),
                        tab === "hourly" &&
                            React.createElement(HourlyMatrixTab, {
                                data,
                                onSelect: handleSelect,
                                activeEntity: selected,
                            }),
                    ),
                    React.createElement(DetailPanel, {
                        entity: selected,
                        onClose: handleClose,
                        statsArtists: data?.artists,
                        statsAlbums: data?.albums,
                    }),
                );
            }

            function kpiCard(value, label, sub) {
                return React.createElement(
                    "div",
                    { className: "kpi-card", key: label },
                    React.createElement(
                        "div",
                        { className: "kpi-value" },
                        value ?? "—",
                    ),
                    React.createElement(
                        "div",
                        { className: "kpi-label" },
                        label,
                    ),
                    sub &&
                        React.createElement(
                            "div",
                            { className: "kpi-sub" },
                            sub,
                        ),
                );
            }

            document.addEventListener("DOMContentLoaded", function () {
                ReactDOM.createRoot(document.getElementById("root")).render(
                    React.createElement(App),
                );
            });
        </script>
